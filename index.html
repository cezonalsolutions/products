<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Working Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:20px;
  background:#f3f4f6;
}

#reader{
  width:320px;
  margin:auto;
  border:2px solid #2563eb;
  border-radius:10px;
  overflow:hidden;
}

#result{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:10px;
}

img{
  width:150px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:8px;
  margin-top:20px;
}

</style>

</head>

<body>

<h2>📦 Barcode Scanner</h2>

<button onclick="startScanner()">
Start Camera
</button>

<div id="reader"></div>

<div id="result">
Waiting...
</div>

<script>

let scanner;

async function startScanner(){

  document.getElementById("result").innerHTML =
    "Opening Camera...";

  scanner = new Html5Qrcode("reader");

  try{

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps:10,
        qrbox:200
      },

      async (decodedText) => {

        document.getElementById("result").innerHTML =
          "Barcode Found: " + decodedText;

        try{

          const response = await fetch(
            "https://world.openfoodfacts.org/api/v0/product/" +
            decodedText +
            ".json"
          );

          const data = await response.json();

          if(data.status === 1){

            const p = data.product;

            document.getElementById("result").innerHTML = `

              <h3>${p.product_name || "No Name"}</h3>

              <p>
                Brand:
                ${p.brands || "Unknown"}
              </p>

              <p>
                Quantity:
                ${p.quantity || "N/A"}
              </p>

              <img src="${p.image_url || ''}">

            `;

          }else{

            document.getElementById("result").innerHTML =
              "Product not found";

          }

        }catch(err){

          document.getElementById("result").innerHTML =
            "API Error";

        }

      }

    );

  }catch(err){

    document.getElementById("result").innerHTML =
      "Camera Error: " + err;

  }

}

</script>

</body>
</html>
