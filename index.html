<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZXing Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

video{
  width:320px;
  border:2px solid blue;
  border-radius:10px;
}

#result{
  margin-top:20px;
  background:#f3f4f6;
  padding:20px;
  border-radius:10px;
}

</style>

</head>

<body>

<h2>📦 Barcode Scanner</h2>

<video id="video"></video>

<div id="result">
Opening camera...
</div>

<script>

console.log("PAGE LOADED");

const codeReader =
  new ZXing.BrowserMultiFormatReader();

async function startScanner(){

  console.log("STARTING CAMERA");

  try{

    const devices =
      await ZXing.BrowserCodeReader.listVideoInputDevices();

    console.log("CAMERAS:", devices);

    const selectedDeviceId =
      devices[0].deviceId;

    const video =
      document.getElementById("video");

    codeReader.decodeFromVideoDevice(

      selectedDeviceId,

      video,

      async (result, err) => {

        if(result){

          console.log("BARCODE FOUND");

          console.log(result.text);

          document.getElementById("result").innerHTML =
            "Barcode: " + result.text;

          try{

            const response = await fetch(
              "https://world.openfoodfacts.org/api/v0/product/" +
              result.text +
              ".json"
            );

            const data = await response.json();

            console.log(data);

            if(data.status === 1){

              const p = data.product;

              document.getElementById("result").innerHTML = `

                <h3>
                  ${p.product_name || "No Name"}
                </h3>

                <p>
                  Brand:
                  ${p.brands || "Unknown"}
                </p>

                <img
                  src="${p.image_url || ''}"
                  width="150"
                >

              `;

            }else{

              document.getElementById("result").innerHTML =
                "Product not found";

            }

          }catch(apiErr){

            console.error(apiErr);

          }

        }

        if(err){

          console.log("SCANNING...");

        }

      }

    );

  }catch(cameraErr){

    console.error(cameraErr);

    document.getElementById("result").innerHTML =
      "Camera Error";

  }

}

startScanner();

</script>

</body>
</html>
