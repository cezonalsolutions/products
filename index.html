<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Debug Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  padding:20px;
  text-align:center;
  background:#f3f4f6;
}

#reader{
  width:320px;
  margin:auto;
  border:2px solid blue;
  border-radius:10px;
  overflow:hidden;
}

#result{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:10px;
}

button{
  padding:12px 20px;
  background:blue;
  color:white;
  border:none;
  border-radius:8px;
}

</style>

</head>

<body>

<h2>📦 Debug Barcode Scanner</h2>

<button onclick="startScanner()">
Start Scanner
</button>

<div id="reader"></div>

<div id="result">
Waiting...
</div>

<script>

let scanner;

console.log("PAGE LOADED");

async function startScanner(){

  console.log("START BUTTON CLICKED");

  document.getElementById("result").innerHTML =
    "Opening camera...";

  try{

    console.log("CREATING SCANNER");

    scanner = new Html5Qrcode("reader");

    console.log("STARTING CAMERA");

    await scanner.start(

      {
        facingMode:"environment"
      },

      {
        fps:10,
        qrbox:{
          width:250,
          height:120
        }
      },

      async function(decodedText){

        console.log("BARCODE DETECTED");

        console.log("BARCODE VALUE:", decodedText);

        document.getElementById("result").innerHTML =
          "Barcode Found: " + decodedText;

        try{

          console.log("CALLING API");

          const url =
            "https://world.openfoodfacts.org/api/v0/product/" +
            decodedText +
            ".json";

          console.log("API URL:", url);

          const response = await fetch(url);

          console.log("API RESPONSE RECEIVED");

          const data = await response.json();

          console.log("API JSON:", data);

          if(data.status === 1){

            console.log("PRODUCT FOUND");

            const p = data.product;

            document.getElementById("result").innerHTML = `

              <h3>${p.product_name || "No Name"}</h3>

              <p>
                Brand:
                ${p.brands || "Unknown"}
              </p>

              <p>
                Quantity:
                ${p.quantity || "N/A"}
              </p>

              <img src="${p.image_url || ''}" width="150">

            `;

          }else{

            console.log("PRODUCT NOT FOUND");

            document.getElementById("result").innerHTML =
              "Product not found";

          }

        }catch(apiError){

          console.error("API ERROR:", apiError);

          document.getElementById("result").innerHTML =
            "API Error";

        }

      },

      function(scanError){

        console.log("SCANNING...");

      }

    );

    console.log("CAMERA STARTED SUCCESSFULLY");

    document.getElementById("result").innerHTML =
      "Camera started. Scan barcode.";

  }catch(cameraError){

    console.error("CAMERA ERROR:", cameraError);

    document.getElementById("result").innerHTML =
      "Camera Error";

  }

}

</script>

</body>
</html>
