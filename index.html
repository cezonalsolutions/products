<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barcode Debug</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

#reader{
  width:320px;
  margin:auto;
}

#result{
  margin-top:20px;
  background:#f3f4f6;
  padding:20px;
  border-radius:10px;
}

</style>

</head>

<body>

<h2>📦 Barcode Scanner</h2>

<div id="reader"></div>

<div id="result">
Starting...
</div>

<script>

console.log("PAGE LOADED");

function onScanSuccess(decodedText){

  console.log("SCANNED:", decodedText);

  document.getElementById("result").innerHTML =
    "Barcode Detected:<br><b>" +
    decodedText +
    "</b><br><br>Searching product...";

  fetch(
    "https://world.openfoodfacts.org/api/v0/product/" +
    decodedText +
    ".json"
  )

  .then(response => {

    console.log("API RESPONSE");

    return response.json();

  })

  .then(data => {

    console.log("API DATA:", data);

    if(data.status === 1){

      const p = data.product;

      document.getElementById("result").innerHTML = `

        <h3>
          ${p.product_name || "No Name"}
        </h3>

        <p>
          Brand:
          ${p.brands || "Unknown"}
        </p>

        <p>
          Barcode:
          ${decodedText}
        </p>

        <img
          src="${p.image_url || ''}"
          width="150"
        >

      `;

    }else{

      document.getElementById("result").innerHTML = `

        <h3>
          Barcode Found ✅
        </h3>

        <p>
          ${decodedText}
        </p>

        <p>
          Product not in database
        </p>

      `;

    }

  })

  .catch(error => {

    console.error(error);

    document.getElementById("result").innerHTML =
      "API Error";

  });

}

function onScanFailure(error){

}

const scanner =
  new Html5QrcodeScanner(

    "reader",

    {
      fps:10,
      qrbox:250
    },

    false

  );

scanner.render(
  onScanSuccess,
  onScanFailure
);

</script>

</body>
</html>
