<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Real Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family: Arial;
  background:#f3f4f6;
  margin:0;
  padding:20px;
  text-align:center;
}

h1{
  color:#111827;
}

#reader{
  width:100%;
  max-width:400px;
  margin:auto;
  border:3px solid #2563eb;
  border-radius:12px;
  overflow:hidden;
  background:white;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

#status{
  margin-top:15px;
  color:#dc2626;
  font-weight:bold;
}

#result{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

img{
  width:180px;
  border-radius:12px;
  margin-top:10px;
}

</style>

</head>

<body>

<h1>📦 Barcode Scanner</h1>

<button onclick="startScanner()">
Start Scanner
</button>

<button onclick="stopScanner()">
Stop Scanner
</button>

<div id="reader"></div>

<div id="status">
Waiting to start scanner...
</div>

<div id="result">
No product scanned
</div>

<script>

let scanner;
let lastBarcode = "";

async function startScanner(){

  document.getElementById("status").innerHTML =
    "Starting camera...";

  try{

    scanner = new Html5Qrcode("reader");

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps:10,
        qrbox:{ width:250, height:120 },
        aspectRatio:1.777
      },

      onScanSuccess,

      onScanFailure

    );

    document.getElementById("status").innerHTML =
      "✅ Camera started. Scan barcode.";

  }catch(err){

    document.getElementById("status").innerHTML =
      "❌ Camera Error: " + err;

  }

}

function onScanFailure(error){

  document.getElementById("status").innerHTML =
    "🔍 Scanning barcode...";

}

async function onScanSuccess(decodedText){

  if(decodedText === lastBarcode){
    return;
  }

  lastBarcode = decodedText;

  document.getElementById("status").innerHTML =
    "✅ Barcode detected: " + decodedText;

  document.getElementById("result").innerHTML =
    "Loading product details...";

  try{

    const response = await fetch(
      `https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`
    );

    const data = await response.json();

    if(data.status === 1){

      const product = data.product;

      document.getElementById("result").innerHTML = `

        <h2>
          ${product.product_name || "Unknown Product"}
        </h2>

        <p>
          <b>Brand:</b>
          ${product.brands || "Unknown"}
        </p>

        <p>
          <b>Quantity:</b>
          ${product.quantity || "N/A"}
        </p>

        <p>
          <b>Barcode:</b>
          ${decodedText}
        </p>

        <img src="${product.image_url || ''}">

      `;

    }else{

      document.getElementById("result").innerHTML = `
        <h2>❌ Product Not Found</h2>
        <p>Barcode: ${decodedText}</p>
      `;

    }

  }catch(err){

    document.getElementById("result").innerHTML = `
      <h2>⚠ API Error</h2>
      <p>${err}</p>
    `;

  }

}

async function stopScanner(){

  if(scanner){

    await scanner.stop();

    document.getElementById("status").innerHTML =
      "⛔ Scanner stopped";

  }

}

</script>

</body>
</html>
