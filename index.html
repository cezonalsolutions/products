
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay ₹10</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .payment-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    .payment-box h2 {
      margin-bottom: 10px;
      color: #111827;
    }

    .payment-box p {
      color: #6b7280;
      margin-bottom: 20px;
    }

    .pay-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
    }

    .pay-btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="payment-box">
    <h2>Pay ₹10</h2>
    <p>Click below to pay using PhonePe, UPI, Card, GPay, Paytm etc.</p>

    <button class="pay-btn" id="payBtn">
      Pay Now
    </button>
  </div>

  <script>
    document.getElementById('payBtn').onclick = function () {

      var options = {
        "key": "rzp_live_SqrUSaPO5pA6gt",

        "amount": "1000",

        "currency": "INR",
        "name": "Cezzo",
        "description": "₹10 Payment",

        "handler": function (response){
          alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);
        },

        "prefill": {
          "name": "Customer",
          "email": "customer@example.com",
          "contact": "9999999999"
        },

        "theme": {
          "color": "#2563eb"
        }
      };

      var rzp1 = new Razorpay(options);
      rzp1.open();
    }
  </script>

</body>
</html>
